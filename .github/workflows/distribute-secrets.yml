name: Distribute bot secrets to all repos

# Pushes APPROVER_APP_ID + APPROVER_APP_PRIVATE_KEY to every active
# repo owned by `aks-builds` so the reusable auto-approve workflow can
# read them. Run on demand:
#
#   1. From the GitHub UI: Actions → "Distribute bot secrets…" → Run workflow.
#   2. Always dry-run first to preview which repos would receive secrets.
#
# Required secrets in *this* repo (one-time setup):
#   - APPROVER_APP_ID         (App ID from github.com/settings/apps/aks-codeowner-bot)
#   - APPROVER_APP_PRIVATE_KEY (contents of the .pem private key)
#   - DISTRIBUTOR_PAT         (your PAT with `repo` scope — needed to write
#                              secrets to other repos in your account)

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview which repos would receive secrets without writing'
        required: false
        type: boolean
        default: true
      exclude-repos:
        description: 'Comma-separated repo names to skip (e.g. "experiment-1,archived-thing")'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  distribute:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.DISTRIBUTOR_PAT }}
      APP_ID: ${{ secrets.APPROVER_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APPROVER_APP_PRIVATE_KEY }}
    steps:
      - name: Validate secrets present
        run: |
          missing=()
          [[ -z "$APP_ID" ]] && missing+=("APPROVER_APP_ID")
          [[ -z "$APP_PRIVATE_KEY" ]] && missing+=("APPROVER_APP_PRIVATE_KEY")
          [[ -z "$GH_TOKEN" ]] && missing+=("DISTRIBUTOR_PAT")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing repo secrets: ${missing[*]}"
            exit 1
          fi

      - name: Push secrets to all owner repos
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          EXCLUDE: ${{ inputs.exclude-repos }}
        run: |
          set -euo pipefail
          OWNER="aks-builds"
          IFS=',' read -ra EXCLUDED <<< "$EXCLUDE"

          repos=$(gh repo list "$OWNER" --limit 1000 --json name,isArchived \
            | jq -r '.[] | select(.isArchived == false) | .name')

          count=0
          for repo in $repos; do
            skip=0
            for ex in "${EXCLUDED[@]:-}"; do
              if [[ -n "$ex" && "$repo" == "$ex" ]]; then skip=1; break; fi
            done
            if [[ $skip -eq 1 ]]; then
              echo "↷ skip $repo (excluded)"
              continue
            fi
            full="$OWNER/$repo"
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "[dry-run] would set secrets on $full"
            else
              echo "→ $full"
              gh secret set APPROVER_APP_ID --body "$APP_ID" --repo "$full"
              printf '%s' "$APP_PRIVATE_KEY" | gh secret set APPROVER_APP_PRIVATE_KEY --repo "$full"
            fi
            count=$((count + 1))
          done

          if [[ "$DRY_RUN" == "true" ]]; then
            echo ""
            echo "Dry run complete. Would distribute to $count repos. Re-run with dry-run=false to apply."
          else
            echo ""
            echo "Distributed to $count repos."
          fi
