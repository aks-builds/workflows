name: Auto-approve owner PRs (reusable)

# Reusable workflow. Consumer repos invoke this from their own
# .github/workflows/auto-approve.yml with:
#
#   jobs:
#     call:
#       uses: aks-builds/workflows/.github/workflows/auto-approve.yml@main
#       secrets: inherit
#
# The PR is auto-approved by the GitHub App identified by the
# APPROVER_APP_ID + APPROVER_APP_PRIVATE_KEY secrets — but ONLY when
# BOTH conditions hold:
#   1. The PR was opened by `owner-login` (default: aks-builds).
#   2. EVERY commit in the PR was authored by `owner-login`.
#
# If any commit comes from a different author (including bots), the
# job exits successfully without approving so a human can review.

on:
  workflow_call:
    inputs:
      owner-login:
        description: GitHub login of the PR author whose PRs should be auto-approved
        required: false
        type: string
        default: aks-builds
      approval-message:
        description: Body to attach to the approval review
        required: false
        type: string
        default: "Auto-approved by aks-codeowner-bot — PR author and every commit author match the sole codeowner."
      require-all-commits-by-owner:
        description: If true, refuse to approve when any commit in the PR has a different author
        required: false
        type: boolean
        default: true
    secrets:
      APPROVER_APP_ID:
        required: true
      APPROVER_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  approve:
    # Fail fast if PR opener is not the owner. Saves a token mint + an API round-trip.
    if: github.event.pull_request.user.login == inputs.owner-login && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Mint app installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APPROVER_APP_ID }}
          private-key: ${{ secrets.APPROVER_APP_PRIVATE_KEY }}

      - name: Verify every commit is authored by the owner
        if: inputs.require-all-commits-by-owner == true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
          OWNER: ${{ inputs.owner-login }}
        run: |
          set -euo pipefail

          # Pull every commit's author login from the PR.
          # `gh pr view` returns a commits array; each commit has authors (plural for co-authors).
          authors_json=$(gh pr view "$PR_NUMBER" --repo "$PR_REPO" \
            --json commits --jq '[.commits[].authors[].login] | unique')

          echo "Commit author logins on this PR: $authors_json"

          # The only acceptable shape: a JSON array containing exactly one entry == OWNER.
          expected=$(printf '["%s"]' "$OWNER")
          if [ "$authors_json" != "$expected" ]; then
            echo "::warning::Refusing to auto-approve — found commits from author(s) other than '$OWNER'."
            echo "       authors: $authors_json"
            echo "       Approve manually if this is intentional."
            # Exit successfully so the job doesn't appear failed in branch protection,
            # but emit a clear log line so the absence of approval is explainable.
            echo "AUTO_APPROVE_SKIPPED=1" >> "$GITHUB_ENV"
          fi

      - name: Approve PR
        if: env.AUTO_APPROVE_SKIPPED != '1'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
          BODY: ${{ inputs.approval-message }}
        run: |
          gh pr review "$PR_NUMBER" --repo "$PR_REPO" --approve --body "$BODY"
